name: Skills Hunter (manual fallback)

# Primary runner is a local Cowork scheduled task that executes on the user's
# Mac using Claude Opus 4.6 (via Claude Max subscription). The cron trigger
# below is intentionally disabled — this workflow is kept as a no-credit
# heuristic-only fallback that can be triggered manually from the Actions tab.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "dry-run"
        type: choice
        options:
          - dry-run
          - auto-commit

permissions:
  contents: write

concurrency:
  group: skills-hunter
  cancel-in-progress: false

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
      X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Configure git
        run: |
          git config user.name  "skills-hunter[bot]"
          git config user.email "skills-hunter@users.noreply.github.com"

      - name: Run hunter
        run: |
          python hunter/run_hunter.py \
            --mode "${{ github.event.inputs.mode || 'dry-run' }}" \
            --stack react,nextjs,typescript,node,python,fastapi,django,tailwind,shadcn
