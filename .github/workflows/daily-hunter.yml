name: Daily Skills Hunter

on:
  schedule:
    # 07:00 UTC every day. Adjust if the user wants local-time precision.
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "auto-commit"
        type: choice
        options:
          - dry-run
          - auto-commit

permissions:
  contents: write  # needed for the hunter to commit + push

concurrency:
  group: daily-hunter
  cancel-in-progress: false

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
      X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Configure git
        run: |
          git config user.name  "skills-hunter[bot]"
          git config user.email "skills-hunter@users.noreply.github.com"

      - name: Run hunter
        run: |
          python hunter/run_hunter.py \
            --mode "${{ github.event.inputs.mode || 'auto-commit' }}" \
            --stack react,nextjs,typescript,node,python,fastapi,django,tailwind,shadcn
